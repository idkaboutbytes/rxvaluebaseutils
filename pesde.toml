name = "idkaboutbytes/rxvaluebaseutils"
version = "1.0.0"
description = "RxValueBaseUtils package extracted from ValueBase."
license = "MIT"
authors = ["idkaboutbytes"]
repository = "https://github.com/idkaboutbytes/rxvaluebaseutils"
includes = ["pesde.toml", "README.md", "CHANGELOG.md", "default.project.json", "src/**/*.luau"]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = ["src"]

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
RxInstanceUtils = { repo = "idkaboutbytes/rxinstanceutils", rev = "v1.0.0" }
RxBrioUtils = { repo = "idkaboutbytes/rxbrioutils", rev = "v1.0.0" }
Rx = { repo = "idkaboutbytes/rx", rev = "v1.0.0" }
Observable = { repo = "idkaboutbytes/observable", rev = "v1.0.0" }
Brio = { repo = "idkaboutbytes/brio", rev = "v1.0.0" }
